  "RUSTSEC-2023-0071",
  # RUSTSEC-2025-0141 — bincode unmaintained (transitive via fastcrypto). Optional path.
  "RUSTSEC-2025-0141",
  # RUSTSEC-2024-0388 — derivative unmaintained (transitive via fastcrypto). Optional path.
  "RUSTSEC-2024-0388",
]
