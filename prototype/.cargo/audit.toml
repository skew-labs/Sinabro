# cargo-audit configuration — atom #194 · C-WP-03A (Stage C GA / mainnet-gate).
#
# `cargo audit` reads the FULL Cargo.lock, independent of cargo features. The three
# advisories below live ONLY on the OPTIONAL `net-testnet` dependency path
# (walrus-core git → fastcrypto 0.1.9 → rsa/bincode/derivative). The default-feature
# `--workspace` shipping binary (mnemos-agent / mnemos-cli) does NOT link them:
#     cargo tree --workspace | grep -c "rsa v0.8"   →   0   (verified)
#
# These are AUDITED, auditor-visible ignores (NOT silent mutes) — each retained with
# an explicit reason so a reviewer sees exactly what is accepted and why. Full run
# output, provenance, and the four resolution options are in
# ops/evidence/stage_c/dependency_audit.md. Re-evaluate on any fastcrypto/walrus-core
# upgrade or if net-testnet ever becomes a default/shipping feature.

[advisories]
ignore = [
