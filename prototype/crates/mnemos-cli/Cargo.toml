# ops/evidence/stage_g/agent_loop/WEB3_RPC_READER_THREAT_MODEL.md (IV-W3R1..IV-W3R9).
web3-egress = ["dep:reqwest"]

# A① LSP (CURSOR PARITY keystone-1, owner §9 Q2 lock 2026-06-16) — the agent's
# language-server READ. OFF by default (same posture as `web-egress`): the
