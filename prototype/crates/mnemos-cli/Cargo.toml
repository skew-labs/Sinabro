lsp = ["dep:serde_json"]

# B⑫ MCP CLIENT (CURSOR PARITY keystone-3, owner §6 B⑫ triangle lock 2026-06-16) —
# the agent's capability-typed MCP host. OFF by default (same posture as `lsp`): the
