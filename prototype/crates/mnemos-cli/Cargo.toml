# --offline` stays valid; 0 new crate). The fetch is an UNAUTHENTICATED GET (secret-zero),
# redirect(none), no_proxy, timeout + byte-cap; the bytes land ONLY under
# std::env::temp_dir() and are NEVER executed. GET-only is the structural chain-WRITE wall;
# the download is owner-armed only (a single-shot `DownloadGrant`), and custody/funds/chain
# stay HARD-LOCKED (`CustodyCapability` uninhabited, PD-6). Threat model:
