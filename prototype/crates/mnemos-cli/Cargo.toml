web-egress = ["dep:reqwest"]

# E13-3 (⑲, owner AskUserQuestion 2026-06-13) — the agent's owner-armed BOUNDED
# DOWNLOAD (a GET that fetches UNTRUSTED bytes into a temp file). OFF by default (same
