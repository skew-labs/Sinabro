[package]
name = "sinabro"
edition.workspace = true
version.workspace = true
license.workspace = true
rust-version.workspace = true
publish = false  # internal workspace crate; never published to crates.io

# Stage F (#401-#410, F-WP-01) — the Sinabro CLI Cockpit crate.
#
# Directory is the plan-mandated `crates/mnemos-cli`; the *package* is named
# `sinabro` because the legacy `bin/mnemos-cli` already owns the package name
# `mnemos-cli` (a duplicate would be a cargo collision). `sinabro` is the public
# product/binary name; `mnemos` is the legacy/internal alias. The crate depends
# on core crates by interface only (no business truth is copied into the CLI) and
# pulls NO CLI/TUI framework: the command surface is a hand-rolled *closed* enum,
# matching the offline-clean `bin/mnemos-cli` convention and keeping the
# `--locked --offline` build dependency surface minimal.
#
# Two `[[bin]]` targets share `src/main.rs` so the single entry point ships as
# both `sinabro` (primary) and `mnemos` (legacy alias). The binary inspects
# argv[0] only for its banner; behaviour is identical.

[[bin]]
name = "sinabro"
path = "src/main.rs"

[[bin]]
name = "mnemos"
path = "src/main.rs"

# atom #416 REPL latency harness. `harness = false` (no criterion — deferred per
# build-state): a plain `fn main()` measures hot-path ops with `std::time` and
# scores p95 against `LatencyBudget`. Run: `cargo bench --bench repl_latency`.
[[bench]]
name = "repl_latency"
harness = false

# atom #426 (F-WP-03A) TUI refresh latency harness. Same `harness = false`
# offline `std::time` posture as `repl_latency`: measures the cockpit pane
# `render`/projection hot path and scores p95 against the §4.3 `LatencyBudget`
# (TUI refresh ceiling 250ms). Run: `cargo bench --bench tui_latency`.
[[bench]]
name = "tui_latency"
harness = false

# atom #474 (F-WP-08) Stage F latency scorecard harness. Same `harness = false`
# offline `std::time` posture: measures the new F-WP-08 hot paths (audit 10k
# filter, trace-line write, release secret scan) and scores p95 against the §4.3
# `LatencyBudget`. Run: `cargo bench --bench stage_f_latency`.
[[bench]]
name = "stage_f_latency"
harness = false

# atom #639 (G.9.15) — Stage G live incident drill. A standalone cargo integration
# test whose source lives OUTSIDE the crate, under `ops/drills/stage_g/`, exercising
# the sinabro PUBLIC API (incident pause + budget hard-stop + gated resume). No live
# action: a pure in-memory control-plane drill. Run: `cargo test -p sinabro --test
# stage_g_live_incident`.
[[test]]
name = "stage_g_live_incident"
path = "../../../ops/drills/stage_g/live_incident.rs"

# atom #648 (G.9.24) — Stage G full live-agent E2E + injection/tool-abuse redteam.
# A standalone cargo integration test under `ops/e2e/stage_g/` over the sinabro
# PUBLIC API: CLI/TG one-envelope turn, control-express, cancel + rollback drill,
# incident pause, and the injection redteam (no scope-widen / exfiltrate / reach
# funds / bypass approval). No live action. Companion evidence: redteam.md. Run:
# `cargo test -p sinabro --test stage_g_live_agent_e2e`.
[[test]]
name = "stage_g_live_agent_e2e"
path = "../../../ops/e2e/stage_g/live_agent_e2e.rs"

