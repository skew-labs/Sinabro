mcp = ["dep:serde_json"]

# libc is unix-only here: it backs `tui::raw` termios raw-mode. On non-unix the
# `tui::raw` stub returns None and the loop uses cooked input (no libc needed).
[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
