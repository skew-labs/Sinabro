# READ-class — `reqwest` is already vendored ⇒ `--locked --offline` stays valid).
# custody/funds/chain-write stay HARD-LOCKED; this only unlocks read-only web GETs.
# P1 S2-4 deploy-flip (owner-directed 2026-06-14, "배포할때도 다 반영"): `put-fixture-net`
# joins the terminal CLI default so the shipped `sinabro` binary self-runs the E14-W2
# two-tier autonomous Walrus memory (READ `memory walrus-index/walrus-fetch` + the P1-4
# `daemon evolve` durable WRITE) out of the box — parity with the Tauri desktop deploy
